# gitleaks configuration — extends the default ruleset
# https://github.com/gitleaks/gitleaks
#
# This file only adds allowlist entries. The built-in rules are loaded
# automatically when [extend] references the default config.

[extend]
useDefault = true

[allowlist]
  paths = [
    '''\.env\.example$''',
    '''\.example$''',
    '''docs/webhook-receiver-design\.md''',
  ]
