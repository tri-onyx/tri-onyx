site_name: TriOnyx
site_description: Security-first agent runtime with information flow control
repo_url: https://github.com/tri-onyx/tri-onyx
repo_name: tri-onyx/tri-onyx

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    scheme: slate
    primary: custom
    accent: teal
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home:
      - Overview: index.md
      - Getting Started: getting-started.md
      - Comparison: comparison.md
  - Architecture:
      - Agent Runtime: agent-runtime.md
      - Protocol: protocol.md
      - FUSE Driver: fuse-driver-spec.md
      - BCP: bcp.md
      - BCP Subscriptions: bcp-subscriptions.md
      - Web Dashboard: web-dashboard.md
      - API Reference: api-reference.md
  - Guides:
      - Matrix Setup: matrix-guide.md
      - Email Setup: email-setup.md
      - Email OAuth2: email-outlook-oauth2.md
      - Browser Sessions: browser-sessions.md
      - Plugins: plugins.md
      - Webhook Receiver: webhook-receiver-design.md
  - Agents:
      - Overview: agents/index.md
      - bookmarks: agents/bookmarks.md
      - cheerleader: agents/cheerleader.md
      - concierge: agents/concierge.md
      - diary: agents/diary.md
      - email: agents/email.md
      - finn: agents/finn.md
      - introspector: agents/introspector.md
      - knowledgebase: agents/knowledgebase.md
      - linkedin: agents/linkedin.md
      - main: agents/main.md
      - news: agents/news.md
      - researcher: agents/researcher.md
      - twitter: agents/twitter.md
      - webhook-handler: agents/webhook-handler.md
      - youtube: agents/youtube.md
  - Development:
      - Project Structure: project-structure.md
      - E2E Testing: e2e-testing.md
      - Architecture Decisions: decisions.md
