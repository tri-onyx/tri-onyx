services:
  gateway:
    build:
      context: .
      dockerfile: gateway.Dockerfile
    command: ["sh", "-c", "mix deps.get && mix run --no-halt"]
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      - ERL_AFLAGS=-sname gateway -setcookie trionyx
      - TRI_ONYX_CONNECTOR_TOKEN
      - TRI_ONYX_AGENTS_DIR=/app/workspace/agent-definitions
      - TRI_ONYX_WORKSPACE_DIR=/app/workspace
      - TRI_ONYX_HOST_ROOT=${PWD}
      - CLAUDE_CODE_OAUTH_TOKEN
      # Email connector (optional — set TRI_ONYX_IMAP_HOST in .env to enable)
      - TRI_ONYX_IMAP_HOST
      - TRI_ONYX_IMAP_PORT
      - TRI_ONYX_IMAP_USERNAME
      - TRI_ONYX_IMAP_PASSWORD
      - TRI_ONYX_IMAP_SSL
      - TRI_ONYX_IMAP_POLL_INTERVAL
      - TRI_ONYX_SMTP_HOST
      - TRI_ONYX_SMTP_PORT
      - TRI_ONYX_SMTP_USERNAME
      - TRI_ONYX_SMTP_PASSWORD
      - TRI_ONYX_SMTP_SSL
      - TRI_ONYX_EMAIL_AGENT
      # Calendar connector (optional — set TRI_ONYX_CALDAV_URL in .env to enable)
      - TRI_ONYX_CALDAV_URL
      - TRI_ONYX_CALDAV_USERNAME
      - TRI_ONYX_CALDAV_PASSWORD
      - TRI_ONYX_CALDAV_BASE_PATH
      - TRI_ONYX_CALDAV_CALENDARS
      - TRI_ONYX_CALDAV_POLL_INTERVAL
      - TRI_ONYX_CALENDAR_AGENT
    volumes:
      - .:/app
      - /app/_build
      - /app/deps
      - /var/run/docker.sock:/var/run/docker.sock

  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      # Read-only: allow GET on container, image, and network endpoints
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      # Block all write operations (POST/DELETE)
      POST: 0
      # Disable other endpoints
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      GRPC: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  connector:
    build:
      context: .
      dockerfile: connector.Dockerfile
    volumes:
      - ./connector/connector:/app/connector
      - ./secrets/connector-config.yaml:/app/config.yaml
      - ./secrets/connector-data:/data
    env_file:
      - .env
    environment:
      - TRI_ONYX_CONNECTOR_TOKEN
      - MATRIX_ACCESS_TOKEN
    depends_on:
      - gateway
